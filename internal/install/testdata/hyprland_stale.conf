# Hyprland configuration
monitor=,preferred,auto,1

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
}

# clauchy start
windowrule = float on, match:class ^clauchy\.panel$
windowrule = size 940 580, match:class ^clauchy\.panel$
windowrule = center on, match:class ^clauchy\.panel$
# clauchy end
