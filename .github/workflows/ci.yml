name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        timezone: [UTC, America/Mexico_City]
    env:
      TZ: ${{ matrix.timezone }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod verify
      - run: go mod tidy -diff
      - run: go vet ./...
      - run: go test -count=1 ./...
      - run: go test -race -count=1 ./...
      - run: CGO_ENABLED=0 go build -trimpath -o /tmp/clauchy .
